name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.tool-versions'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.tool-versions'
      - name: Install dependencies
        run: npm ci
      - name: Unit Tests
        run: npm run test:unit

  e2e-chrome:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.tool-versions'
      - name: Install dependencies
        run: npm ci
      - name: Run tests with flags
        run: npm run wdio -- --target=chrome

  e2e-chrome-update:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.tool-versions'
      - name: Install dependencies
        run: npm ci
      - name: Run tests after updating the extension
        run: npm run wdio:update -- --target=chrome

  e2e-firefox:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.tool-versions'
      - name: Install dependencies
        run: npm ci
      - name: Run tests with flags
        run: npm run wdio -- --target=firefox

  e2e-firefox-update:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.tool-versions'
      - name: Install dependencies
        run: npm ci
      - name: Run tests after updating the extension
        run: npm run wdio:update -- --target=firefox

  # Scriptlet injection on the minimum supported Firefox (115), where the `world`
  # and `matchOriginAsFallback` content-script options are not available.
  e2e-firefox-min:
    runs-on: ubuntu-latest
    needs: unit
    env:
      FIREFOX_VERSION: esr_115.0
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.tool-versions'
      - name: Install dependencies
        run: npm ci
      - name: Run scriptlet execution-world tests
        run: npm run wdio -- --target=firefox --spec tests/e2e/spec/adblocker.spec.js --mochaOpts.grep "Execution world"
