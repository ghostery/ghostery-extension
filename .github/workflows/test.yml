name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.tool-versions'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.tool-versions'
      - name: Install dependencies
        run: npm ci
      - name: Unit Tests
        run: npm run test:unit

  e2e-chrome:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.tool-versions'
      - name: Install dependencies
        run: npm ci
      - name: Run tests with flags
        run: npm run wdio -- --target=chrome

  e2e-chrome-update:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.tool-versions'
      - name: Install dependencies
        run: npm ci
      - name: Run tests after updating the extension
        run: npm run wdio:update -- --target=chrome

  e2e-firefox:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.tool-versions'
      - name: Install dependencies
        run: npm ci
      - name: Run tests with flags
        run: npm run wdio -- --target=firefox

  e2e-firefox-update:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.tool-versions'
      - name: Install dependencies
        run: npm ci
      - name: Run tests after updating the extension
        run: npm run wdio:update -- --target=firefox
