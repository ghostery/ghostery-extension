name: Update Translations

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-translations-main
  cancel-in-progress: true

jobs:
  update-translations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.tool-versions'

      - name: Install dependencies
        run: npm ci

      - name: Generate locales
        run: npm run locales

      - name: Check for new source strings
        id: changes
        run: |
          set -euo pipefail

          MESSAGES=src/_locales/en/messages.json
          BRANCH=chore/translations

          # Compare the freshly generated English source against the open
          # translations PR branch when it exists, otherwise against main. The
          # translation-only commits Transifex pushes to the branch never touch
          # this file, so they are not seen as changes and the PR is left alone
          # unless new source strings actually appear.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch --depth=1 origin "$BRANCH"
            BASE_REF=FETCH_HEAD
          else
            BASE_REF=HEAD
          fi

          if git diff --quiet "$BASE_REF" -- "$MESSAGES"; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
          else
            echo 'changed=true' >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update translations PR
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/translations
          base: main
          commit-message: 'chore(locales): update translations'
          title: 'chore(locales): update translations'
          reviewers: smalluban, mdsandu
          body: |
            Automated update generated by `npm run locales` on push to `main`.

            Update and review translations on [Transifex](https://app.transifex.com/ghostery-inc/ghostery-dnr-extension/translate).
