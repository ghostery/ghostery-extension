name: Update Translations

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-translations-main
  cancel-in-progress: true

jobs:
  update-translations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.tool-versions'

      - name: Install dependencies
        run: npm ci

      - name: Generate locales
        run: npm run locales

      - name: Check for locale updates
        id: changes
        run: |
          if ! git diff --quiet -- src/_locales/en/messages.json; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update translations PR
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore-translations
          base: main
          commit-message: 'chore(locales): update translations'
          title: 'chore(locales): update translations'
          body: |
            Automated update generated by `npm run locales` on push to `main`.
